<!doctype html>
<html lang="en">
  <head>
    <!-- Primary Meta -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- SEO Title -->
    <title>
      IMOS — Enterprise AI Operating System for Teams, Orchestration & Intelligent Workflows
    </title>

    <!-- SEO Meta Description -->
    <meta
      name="description"
      content="IMOS is an enterprise AI operating system built for orchestration, memory, workflows, intelligent routing, and operator-grade execution. Unify AI agents, team collaboration, tools, launches, and strategic delivery inside one cinematic control layer."
    />

    <!-- SEO Keywords -->
    <meta
      name="keywords"
      content="AI operating system, enterprise AI platform, AI orchestration platform, AI workflow automation, operator system, AI agents, enterprise automation, AI memory system, intelligent workflows, AI routing engine, collaborative AI platform, workflow orchestration software, product operations AI, AI control layer, enterprise productivity platform"
    />

    <!-- Indexing -->
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="googlebot" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://imos.ai/" />

    <!-- Brand -->
    <meta name="application-name" content="IMOS" />
    <meta name="author" content="IMOS" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="IMOS — Enterprise AI Operating System"
    />
    <meta
      property="og:description"
      content="A cinematic AI orchestration platform for teams that need intelligent workflows, memory, strategy, routing, and launch execution in one enterprise control system."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://imos.ai/" />
    <meta property="og:image" content="https://imos.ai/og-cover.jpg" />
    <meta property="og:site_name" content="IMOS" />

    <!-- Twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />
    <meta
      name="twitter:title"
      content="IMOS — Enterprise AI Orchestration Platform"
    />
    <meta
      name="twitter:description"
      content="Unify AI execution, workflows, memory, orchestration, and delivery into one cinematic operating system for modern enterprise teams."
    />
    <meta
      name="twitter:image"
      content="https://imos.ai/og-cover.jpg"
    />

    <!-- Theme -->
    <meta name="theme-color" content="#000000" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Instrument+Serif:ital@1&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "IMOS",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "url": "https://imos.ai",
        "logo": "https://imos.ai/logo.png",
        "description": "IMOS is an enterprise AI operating system for orchestration, memory, intelligent routing, workflow execution, and operator-grade delivery.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "brand": {
          "@type": "Brand",
          "name": "IMOS"
        }
      }
    </script>
  </head>

  <body>
    <!-- SEO Content Layer -->
    <noscript>
      IMOS is an enterprise AI operating system designed for orchestration,
      intelligent workflows, AI routing, memory systems, collaborative
      execution, and operator-grade delivery for modern teams.
    </noscript>

    <!-- Root App -->
    <div id="root"></div>

    <!-- Main Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
